<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PazaSoutien</title>
    <style>
        /* Reset simple */
        * {
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #b0b9cc; /* Couleur de fond bleu clair grisé */
            color: #333;
            min-height: 100vh;
        }
        header {
            background-color: #7f7bc5; /* Violet clair (comme sur capture) */
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        a {
            color: white;
            text-decoration: none;
            font-weight: normal;
            font-size: 1rem;
            cursor: pointer;
        }
        a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 800px;
            margin: 6rem auto 2rem;
            padding: 0 1rem;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: #2d2d2d;
        }
        button {
            background-color: #7f7bc5; /* même violet clair */
            border: none;
            border-radius: 25px;
            padding: 0.75rem 2rem;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #625fb9;
        }

        /* Responsive simple */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }
            main {
                margin: 4rem 1rem 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div>PazaSoutien</div>
        <nav>
            <a href="#">Accueil</a>
        </nav>
    </header>

    <main>
        <h1>Soutien Scolaire en Ligne pour Tous les Âges</h1>
        <p>Maths, Français, Anglais, etc.</p>
        <button>Découvrir les Cours</button>
    </main>

</body>
</html>
