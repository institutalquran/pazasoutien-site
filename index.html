<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PazaSoutien</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; }
  .navbar {
    background-color: #746ebc;
    color: white;
    padding: 10px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo img {
    height: 40px; vertical-align: middle;
  }
  .nav-links a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: bold;
  }
  .hero {
    background-color: #d6dde8;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 80px 20px;
  }
  .hero-content h1 {
    font-size: 2.5rem;
    color: #333;
    margin-bottom: 10px;
  }
  .hero-content p {
    font-size: 1.2rem;
    color: #333;
  }
  .btn-primary {
    display: inline-block;
    padding: 12px 30px;
    background-color: #746ebc;
    color: white;
    text-decoration: none;
    border-radius: 30px;
    margin-top: 20px;
    font-weight: bold;
  }
  .hero-image img {
    max-width: 400px;
    border-radius: 12px;
  }
  @media (max-width: 768px) {
    .hero {
      flex-direction: column;
      text-align: center;
      padding: 40px 20px;
    }
    .hero-image {
      margin-top: 30px;
    }
  }
</style>
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">
      <img src="images/logo-paza.png" alt="Logo PazaSoutien" />
      <span>PazaSoutien</span>
    </div>
    <div class="nav-links">
      <a href="#accueil">Accueil</a>
    </div>
  </nav>
</header>

<section class="hero" id="accueil">
  <div class="hero-content">
    <h1>Soutien Scolaire en Ligne pour Tous les Âges</h1>
    <p>Maths, Français, Anglais, etc.</p>
    <a href="#cours" class="btn-primary">Découvrir les Cours</a>
  </div>
  <div class="hero-image">
    <img src="images/hero.png" alt="Illustration soutien scolaire" />
  </div>
</section>

</body>
</html>
